<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chatbot API - code.AI</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        h1 { color: #6366f1; }
        .test-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover { transform: translateY(-2px); }
        .output {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            min-height: 100px;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #334155;
        }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
        .info { color: #60a5fa; }
        textarea {
            width: 100%;
            min-height: 80px;
            background: #1a1a2e;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🤖 Test code.AI Chatbot</h1>
    
    <div class="test-section">
        <h2>Quick Test</h2>
        <button onclick="testAPI()">Run Test</button>
        <div id="output" class="output">Click "Run Test" to start...</div>
    </div>

    <div class="test-section">
        <h2>Custom Message</h2>
        <textarea id="customMessage" placeholder="Type your message...">What is Java?</textarea>
        <button onclick="testCustomMessage()">Send Custom Message</button>
        <div id="customOutput" class="output">Type a message and click "Send Custom Message"...</div>
    </div>

    <script>
        const SPACE_NAME = 'Rahul8073/code.AI';
        const ENDPOINT = '/respond';
        
        async function testAPI() {
            const output = document.getElementById('output');
            output.innerHTML = '<span class="info">⏳ Sending request...</span>';
            
            const requestData = {
                data: [
                    "Hello! Can you help me learn programming?",
                    "You are a friendly Chatbot.",
                    512,
                    0.7,
                    0.95
                ]
            };

            try {
                const apiUrl = `https://${SPACE_NAME}.hf.space/gradio_api/call${ENDPOINT}`;
                console.log('📤 Sending to:', apiUrl);
                
                output.innerHTML += '\n\n<span class="info">Request:</span>\n' + JSON.stringify(requestData, null, 2);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const eventData = await response.json();
                console.log('📥 Response:', eventData);
                
                output.innerHTML = '<span class="success">✅ Response received!</span>\n\n';
                output.innerHTML += '<span class="info">Full Response:</span>\n' + JSON.stringify(eventData, null, 2);
                
                // Check for direct response
                if (eventData.data && Array.isArray(eventData.data) && eventData.data[0]) {
                    output.innerHTML += '\n\n<span class="success">🤖 Bot says:</span>\n' + eventData.data[0];
                }
                
                // Try streaming if event_id exists
                if (eventData.event_id) {
                    output.innerHTML += '\n\n<span class="info">⏳ Streaming from event...</span>';
                    await streamResponse(eventData.event_id, output);
                }
            } catch (error) {
                output.innerHTML = '<span class="error">❌ Error:</span>\n' + error.message;
                console.error(error);
            }
        }

        async function testCustomMessage() {
            const message = document.getElementById('customMessage').value;
            const output = document.getElementById('customOutput');
            output.innerHTML = '<span class="info">⏳ Sending...</span>';
            
            const requestData = {
                data: [
                    message,
                    "You are a friendly Chatbot.",
                    512,
                    0.7,
                    0.95
                ]
            };

            try {
                const apiUrl = `https://${SPACE_NAME}.hf.space/gradio_api/call${ENDPOINT}`;
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const eventData = await response.json();
                
                output.innerHTML = '<span class="success">✅ Response!</span>\n\n';
                output.innerHTML += JSON.stringify(eventData, null, 2);
                
                if (eventData.data && eventData.data[0]) {
                    output.innerHTML += '\n\n<span class="success">🤖 Answer:</span>\n' + eventData.data[0];
                }
                
                if (eventData.event_id) {
                    output.innerHTML += '\n\n<span class="info">⏳ Checking stream...</span>';
                    await streamResponse(eventData.event_id, output);
                }
            } catch (error) {
                output.innerHTML = '<span class="error">❌ Error:</span>\n' + error.message;
            }
        }

        async function streamResponse(eventId, outputElement) {
            try {
                const streamUrl = `https://${SPACE_NAME}.hf.space/gradio_api/call${ENDPOINT}/${eventId}`;
                const streamResponse = await fetch(streamUrl);
                const streamText = await streamResponse.text();
                
                console.log('📊 Stream:', streamText);
                outputElement.innerHTML += '\n\n<span class="info">Stream Data:</span>\n' + streamText.substring(0, 500);
                
                // Parse SSE events
                const lines = streamText.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: null') {
                        try {
                            const sseData = JSON.parse(line.slice(6));
                            if (sseData.data && sseData.data[0]) {
                                outputElement.innerHTML += '\n\n<span class="success">✨ Final Answer:</span>\n' + sseData.data[0];
                            }
                        } catch (e) {}
                    }
                }
            } catch (err) {
                console.log('⚠️ Stream error:', err.message);
            }
        }
    </script>
</body>
</html>
